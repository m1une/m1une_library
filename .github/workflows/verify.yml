name: verify

on: push

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: pip3 install -U online-judge-verify-helper

    - name: Run tests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        YUKICODER_TOKEN: ${{ secrets.YUKICODER_TOKEN }}
      # A widely used header can invalidate every verification target. Use both
      # runner cores and leave enough time to refresh the complete timestamp set.
      run: oj-verify run -j 2 --timeout 7200

    - name: Check verification completeness
      run: |
        expected="$(git ls-files 'verify/**/*.test.cpp' | wc -l)"
        verified="$(jq length .verify-helper/timestamps.remote.json)"
        if [ "$verified" -ne "$expected" ]; then
          echo "::error::Only $verified of $expected verification files completed."
          exit 1
        fi

    - name: Generate documentation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      run: oj-verify docs -j 2
